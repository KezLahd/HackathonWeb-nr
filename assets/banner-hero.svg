<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Hackathon Co-op">
  <defs>
    <linearGradient id="hkName" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="hkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#030306"/>
    </linearGradient>
    <radialGradient id="hkCyanGlow" cx="20%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hkPurpleGlow" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hkGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#hkBg)"/>
  <rect width="1200" height="400" fill="url(#hkGrid)"/>
  <rect width="1200" height="400" fill="url(#hkCyanGlow)"/>
  <rect width="1200" height="400" fill="url(#hkPurpleGlow)"/>

  <g transform="translate(80, 54)">
    <rect width="210" height="28" rx="14" fill="#00D4FF" fill-opacity="0.1" stroke="#00D4FF" stroke-opacity="0.5"/>
    <circle cx="18" cy="14" r="4" fill="#00D4FF"/>
    <circle cx="30" cy="14" r="4" fill="#8B5CF6"/>
    <text x="113" y="18.5" text-anchor="middle" fill="#7DD3FC" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="2.2">CO-OP TASK BOARD</text>
  </g>

  <text x="80" y="240" fill="url(#hkName)" font-family="'Instrument Serif','Georgia',serif" font-size="176" letter-spacing="-5" filter="url(#glow)">Hackathon<tspan fill="#14B8A6">.</tspan></text>

  <text x="82" y="288" fill="#E5E7EB" fill-opacity="0.55" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="18" font-weight="300">A two-person task board we built to stay out of each other's way while vibe-coding.</text>

  <g transform="translate(80, 324)" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="1.6">
    <g>
      <rect width="92" height="26" rx="13" fill="#0a0a0a" stroke="#00D4FF" stroke-opacity="0.5"/>
      <text x="46" y="17" text-anchor="middle" fill="#7DD3FC">NEXT.JS</text>
    </g>
    <g transform="translate(100, 0)">
      <rect width="100" height="26" rx="13" fill="#0a0a0a" stroke="#8B5CF6" stroke-opacity="0.5"/>
      <text x="50" y="17" text-anchor="middle" fill="#C4B5FD">SUPABASE</text>
    </g>
    <g transform="translate(208, 0)">
      <rect width="86" height="26" rx="13" fill="#0a0a0a" stroke="#14B8A6" stroke-opacity="0.5"/>
      <text x="43" y="17" text-anchor="middle" fill="#5EEAD4">AI SDK</text>
    </g>
    <g transform="translate(302, 0)">
      <rect width="68" height="26" rx="13" fill="#0a0a0a" stroke="#00D4FF" stroke-opacity="0.5"/>
      <text x="34" y="17" text-anchor="middle" fill="#7DD3FC">V0</text>
    </g>
    <g transform="translate(378, 0)">
      <rect width="120" height="26" rx="13" fill="#0a0a0a" stroke="#8B5CF6" stroke-opacity="0.5"/>
      <text x="60" y="17" text-anchor="middle" fill="#C4B5FD">TWO-PERSON CO-OP</text>
    </g>
  </g>

  <g transform="translate(1010, 190)">
    <circle cx="-40" cy="0" r="44" fill="none" stroke="#00D4FF" stroke-opacity="0.55" stroke-width="2"/>
    <circle cx="40" cy="0" r="44" fill="none" stroke="#8B5CF6" stroke-opacity="0.55" stroke-width="2"/>
    <circle cx="-40" cy="0" r="44" fill="#00D4FF" fill-opacity="0.08"/>
    <circle cx="40" cy="0" r="44" fill="#8B5CF6" fill-opacity="0.08"/>
    <circle cx="0" cy="0" r="8" fill="#14B8A6" filter="url(#glow)"/>
    <text x="-40" y="-60" text-anchor="middle" fill="#7DD3FC" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="1.6">ME</text>
    <text x="40" y="-60" text-anchor="middle" fill="#C4B5FD" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="1.6">MATE</text>
    <text x="0" y="76" text-anchor="middle" fill="#5EEAD4" font-family="'DM Sans','Inter',system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="1.6">SHARED WORK</text>
  </g>
</svg>
